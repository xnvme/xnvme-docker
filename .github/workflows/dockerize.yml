---
name: dockerize

on:
  workflow_dispatch:
  push:
    branches:
    - 'main'
    - 'exp'
  schedule:
    - cron: '0 */12 * * *'

concurrency:
  group: dockerize-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  gen-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Regenerate the Dockerfiles
      run: |
        pip install jinja2 pyyaml
        rm -rf dockerfiles
        python3 gen-dockerfiles.py

    - name: Fail on drift between committed and generated Dockerfiles
      run: |
        git add -A dockerfiles
        git diff --cached --exit-code

  dockerize:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        container:
        - {os: 'alpine', dh: 'refenv/alpine-bash', ver: 'latest'}
        - {os: 'archlinux', dh: 'archlinux', ver: 'latest'}
        - {os: 'centos', dh: 'quay.io/centos/centos', ver: 'stream9'}
        - {os: 'centos', dh: 'quay.io/centos/centos', ver: 'stream10'}
        - {os: 'debian', dh: 'debian', ver: 'latest', kind: 'citools'}
        - {os: 'debian', dh: 'debian', ver: 'bookworm'}
        - {os: 'debian', dh: 'debian', ver: 'forky'}
        - {os: 'debian', dh: 'debian', ver: 'trixie'}
        - {os: 'fedora', dh: 'fedora', ver: '42'}
        - {os: 'fedora', dh: 'fedora', ver: '43'}
        - {os: 'gentoo', dh: 'gentoo/stage3', ver: 'latest'}
        - {os: 'opensuse-tumbleweed', dh: 'opensuse/tumbleweed', ver: 'latest'}
        - {os: 'oraclelinux', dh: 'oraclelinux', ver: '9'}
        - {os: 'oraclelinux', dh: 'oraclelinux', ver: '10'}
        - {os: 'rockylinux', dh: 'rockylinux/rockylinux', ver: '9.7'}
        - {os: 'rockylinux', dh: 'rockylinux/rockylinux', ver: '10.1'}
        - {os: 'ubuntu', dh: 'ubuntu', ver: 'jammy'}
        - {os: 'ubuntu', dh: 'ubuntu', ver: 'noble'}
        - {os: 'ubuntu', dh: 'ubuntu', ver: 'questing'}

    env:
      XNVME_REF: dockerize-for-${{ github.ref_name }}
      IMAGE_ID: ghcr.io/${{ github.repository_owner }}/xnvme-${{ matrix.container.kind || 'deps' }}-${{ matrix.container.os }}-${{ matrix.container.ver }}:${{ github.ref_name }}

    steps:
    - name: Grab xnvme-docker
      uses: actions/checkout@v6

    - name: Grab xNVMe
      run: |
        mkdir -p builddir/xnvme
        curl -fSL https://github.com/xnvme/xnvme/tarball/${XNVME_REF} -o xnvme.tgz
        tar xzf xnvme.tgz --strip-components=1 -C builddir/xnvme

    - name: Build
      run: |
        docker build \
        -t ${IMAGE_ID} \
        -f dockerfiles/${{ matrix.container.os }}/${{ matrix.container.ver }}/Dockerfile \
        builddir

    - name: Log into GitHub Container Registry
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login https://ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Push to ghcr.io
      run: |
        docker push ${IMAGE_ID}
